name: Mobile App CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: mobile-app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  android_ci:
    name: Android CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch || github.ref_name == 'develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Resolve Android build metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
            VERSION_NAME="main.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_TAG="android-main-${GITHUB_RUN_NUMBER}"
          else
            VERSION_NAME="dev.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_TAG=""
          fi

          echo "ORG_GRADLE_PROJECT_androidVersionCode=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "ORG_GRADLE_PROJECT_androidVersionName=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "ANDROID_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "UPDATE_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "UPDATE_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "UPDATE_RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "UPDATE_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}" >> "${GITHUB_ENV}"
          echo "UPDATE_REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}" >> "${GITHUB_ENV}"
          echo "UPDATE_COMMIT_SHA=${GITHUB_SHA}" >> "${GITHUB_ENV}"

      - name: Prepare CI stubs
        env:
          CI_SMTP_HOST: ${{ secrets.CI_SMTP_HOST }}
          CI_SMTP_PORT: ${{ secrets.CI_SMTP_PORT }}
          CI_SMTP_USERNAME: ${{ secrets.CI_SMTP_USERNAME }}
          CI_SMTP_PASSWORD: ${{ secrets.CI_SMTP_PASSWORD }}
          CI_SMTP_FROM_EMAIL: ${{ secrets.CI_SMTP_FROM_EMAIL }}
          CI_SMTP_FROM_NAME: ${{ secrets.CI_SMTP_FROM_NAME }}
          CI_FEEDBACK_TO_EMAIL: ${{ secrets.CI_FEEDBACK_TO_EMAIL }}
          CI_FEEDBACK_SUBJECT: ${{ secrets.CI_FEEDBACK_SUBJECT }}
        run: bash scripts/prepare_ci_stubs.sh

      - name: Run Android lint
        run: ./gradlew :composeApp:lintDebug --stacktrace

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: Build and stage APK artifact
        run: bash scripts/prepare_mobile_showcase.sh

      - name: Generate Android update manifest
        if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
        run: bash scripts/generate_android_update_manifest.sh

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          if-no-files-found: warn
          retention-days: 14
          path: |
            composeApp/build/reports/lint-results-debug.html
            composeApp/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-report
          if-no-files-found: warn
          retention-days: 14
          path: |
            composeApp/build/reports/tests/testDebugUnitTest/
            composeApp/build/test-results/testDebugUnitTest/

      - name: Upload delivery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-delivery-artifacts
          if-no-files-found: warn
          retention-days: 14
          path: release-artifacts/

  ios_kotlin_validation:
    name: iOS Kotlin Validation
    runs-on: macos-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || github.ref_name == 'develop' || startsWith(github.ref, 'refs/tags/')))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Prepare CI stubs
        env:
          CI_SMTP_HOST: ${{ secrets.CI_SMTP_HOST }}
          CI_SMTP_PORT: ${{ secrets.CI_SMTP_PORT }}
          CI_SMTP_USERNAME: ${{ secrets.CI_SMTP_USERNAME }}
          CI_SMTP_PASSWORD: ${{ secrets.CI_SMTP_PASSWORD }}
          CI_SMTP_FROM_EMAIL: ${{ secrets.CI_SMTP_FROM_EMAIL }}
          CI_SMTP_FROM_NAME: ${{ secrets.CI_SMTP_FROM_NAME }}
          CI_FEEDBACK_TO_EMAIL: ${{ secrets.CI_FEEDBACK_TO_EMAIL }}
          CI_FEEDBACK_SUBJECT: ${{ secrets.CI_FEEDBACK_SUBJECT }}
        run: bash scripts/prepare_ci_stubs.sh

      - name: Compile iOS Kotlin target
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --stacktrace

  publish_app_showcase:
    name: Publish App Showcase Image
    runs-on: ubuntu-latest
    needs:
      - android_ci
    if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-delivery-artifacts
          path: release-artifacts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/itclinicapp-showcase"

          TAGS="${IMAGE}:${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            TAGS="${TAGS}"$'\n'"${IMAGE}:${SAFE_REF}"

            if [[ "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
              TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${GITHUB_REF_NAME}"
          fi

          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app-showcase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  publish_android_update_release:
    name: Publish Android Update Release
    runs-on: ubuntu-latest
    needs:
      - android_ci
      - ios_kotlin_validation
    if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download delivery artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-delivery-artifacts
          path: release-artifacts

      - name: Resolve Android release metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            VERSION_NAME="main.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_TAG="android-main-${GITHUB_RUN_NUMBER}"
          fi

          echo "ANDROID_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "UPDATE_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "UPDATE_RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"

      - name: Create or update GitHub release for main branch
        if: github.ref_name == github.event.repository.default_branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$UPDATE_RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1 || \
            gh release create "$UPDATE_RELEASE_TAG" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "Android main build $ANDROID_VERSION_NAME" \
              --notes "Automated Android main-branch delivery build for in-app update checks." \
              --prerelease

      - name: Create or update GitHub release for tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$UPDATE_RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1 || \
            gh release create "$UPDATE_RELEASE_TAG" --repo "$GH_REPO" --generate-notes

      - name: Upload Android delivery assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$UPDATE_RELEASE_TAG" \
            --repo "$GH_REPO" \
            release-artifacts/itclinicapp-debug.apk \
            release-artifacts/android-update.json \
            --clobber
