name: Mobile App CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Existing image tag to promote back to latest"
        required: false
        type: string

concurrency:
  group: mobile-app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint_android:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app config templates
        shell: bash
        run: |
          cp composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.example.kt \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.kt
          cp composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.example.kt \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.kt

          perl -0pi -e 's/object BuildConfigExample/object BuildConfig/' \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.kt
          perl -0pi -e 's/object MailConfigExample/object MailConfig/' \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.kt

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Android lint
        run: ./gradlew :composeApp:lintDebug --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: |
            composeApp/build/reports/lint-results-debug.html
            composeApp/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt

  unit_tests_android:
    name: Android Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app config templates
        shell: bash
        run: |
          cp composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.example.kt \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.kt
          cp composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.example.kt \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.kt

          perl -0pi -e 's/object BuildConfigExample/object BuildConfig/' \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.kt
          perl -0pi -e 's/object MailConfigExample/object MailConfig/' \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.kt

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-report
          path: |
            composeApp/build/reports/tests/testDebugUnitTest/
            composeApp/build/test-results/testDebugUnitTest/

  build_android_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs:
      - lint_android
      - unit_tests_android
    if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app config templates
        shell: bash
        run: |
          cp composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.example.kt \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.kt
          cp composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.example.kt \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.kt

          perl -0pi -e 's/object BuildConfigExample/object BuildConfig/' \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/BuildConfig.kt
          perl -0pi -e 's/object MailConfigExample/object MailConfig/' \
            composeApp/src/commonMain/kotlin/com/spbu/projecttrack/MailConfig.kt

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp composeApp/build/outputs/apk/debug/composeApp-debug.apk \
            release-artifacts/itclinicapp-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: release-artifacts/itclinicapp-debug.apk

  publish_app_showcase:
    name: Publish App Showcase Image
    runs-on: ubuntu-latest
    needs:
      - build_android_apk
    if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: release-artifacts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/itclinicapp-showcase"

          TAGS="${IMAGE}:${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            TAGS="${TAGS}"$'\n'"${IMAGE}:${SAFE_REF}"

            if [[ "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
              TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${GITHUB_REF_NAME}"
          fi

          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app-showcase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  rollback_app_showcase:
    name: Roll Back App Showcase Image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_tag != ''
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote selected tag to latest
        shell: bash
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/itclinicapp-showcase"

          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${{ github.event.inputs.rollback_tag }}"
