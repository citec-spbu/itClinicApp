name: Mobile App CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: mobile-app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  android_ci:
    name: Android CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch || github.ref_name == 'develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Resolve Android build metadata
        shell: bash
        env:
          ANDROID_BETA_MIN_SUPPORTED_VERSION_CODE: ${{ vars.ANDROID_BETA_MIN_SUPPORTED_VERSION_CODE }}
          ANDROID_BETA_FORCE_UPDATE: ${{ vars.ANDROID_BETA_FORCE_UPDATE }}
          ANDROID_STABLE_MIN_SUPPORTED_VERSION_CODE: ${{ vars.ANDROID_STABLE_MIN_SUPPORTED_VERSION_CODE }}
          ANDROID_STABLE_FORCE_UPDATE: ${{ vars.ANDROID_STABLE_FORCE_UPDATE }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          CHANGELOG_JSON="$(bash scripts/resolve_android_update_changelog.sh)"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
            UPDATE_CHANNEL="stable"
            DELIVERY_BUILD_TYPE="release"
            UPDATE_ASSET_NAME="itclinicapp-release.apk"
            MIN_SUPPORTED_VERSION_CODE="${ANDROID_STABLE_MIN_SUPPORTED_VERSION_CODE:-0}"
            FORCE_UPDATE="${ANDROID_STABLE_FORCE_UPDATE:-false}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
            VERSION_NAME="main.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_TAG="android-main-${GITHUB_RUN_NUMBER}"
            UPDATE_CHANNEL="beta"
            DELIVERY_BUILD_TYPE="release"
            UPDATE_ASSET_NAME="itclinicapp-release.apk"
            MIN_SUPPORTED_VERSION_CODE="${ANDROID_BETA_MIN_SUPPORTED_VERSION_CODE:-0}"
            FORCE_UPDATE="${ANDROID_BETA_FORCE_UPDATE:-false}"
          else
            VERSION_NAME="dev.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_TAG=""
            UPDATE_CHANNEL="beta"
            DELIVERY_BUILD_TYPE="debug"
            UPDATE_ASSET_NAME="itclinicapp-debug.apk"
            MIN_SUPPORTED_VERSION_CODE="0"
            FORCE_UPDATE="false"
          fi

          echo "ORG_GRADLE_PROJECT_androidVersionCode=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "ORG_GRADLE_PROJECT_androidVersionName=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "ANDROID_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "UPDATE_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "UPDATE_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "UPDATE_RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "UPDATE_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}" >> "${GITHUB_ENV}"
          echo "UPDATE_REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}" >> "${GITHUB_ENV}"
          echo "UPDATE_COMMIT_SHA=${GITHUB_SHA}" >> "${GITHUB_ENV}"
          echo "UPDATE_CHANNEL=${UPDATE_CHANNEL}" >> "${GITHUB_ENV}"
          echo "UPDATE_ASSET_NAME=${UPDATE_ASSET_NAME}" >> "${GITHUB_ENV}"
          echo "ANDROID_DELIVERY_BUILD_TYPE=${DELIVERY_BUILD_TYPE}" >> "${GITHUB_ENV}"
          echo "UPDATE_MIN_SUPPORTED_VERSION_CODE=${MIN_SUPPORTED_VERSION_CODE}" >> "${GITHUB_ENV}"
          echo "UPDATE_FORCE_UPDATE=${FORCE_UPDATE}" >> "${GITHUB_ENV}"
          echo "UPDATE_CHANGELOG_JSON=${CHANGELOG_JSON}" >> "${GITHUB_ENV}"

      - name: Prepare CI stubs
        env:
          CI_SMTP_HOST: ${{ secrets.CI_SMTP_HOST }}
          CI_SMTP_PORT: ${{ secrets.CI_SMTP_PORT }}
          CI_SMTP_USERNAME: ${{ secrets.CI_SMTP_USERNAME }}
          CI_SMTP_PASSWORD: ${{ secrets.CI_SMTP_PASSWORD }}
          CI_SMTP_FROM_EMAIL: ${{ secrets.CI_SMTP_FROM_EMAIL }}
          CI_SMTP_FROM_NAME: ${{ secrets.CI_SMTP_FROM_NAME }}
          CI_FEEDBACK_TO_EMAIL: ${{ secrets.CI_FEEDBACK_TO_EMAIL }}
          CI_FEEDBACK_SUBJECT: ${{ secrets.CI_FEEDBACK_SUBJECT }}
          CI_POSTHOG_API_KEY: ${{ secrets.CI_POSTHOG_API_KEY }}
          CI_POSTHOG_HOST: ${{ secrets.CI_POSTHOG_HOST }}
        run: bash scripts/prepare_ci_stubs.sh

      - name: Prepare Android release signing
        if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        shell: bash
        run: |
          : "${ANDROID_RELEASE_KEYSTORE_BASE64:?ANDROID_RELEASE_KEYSTORE_BASE64 is required for signed release builds}"
          : "${ANDROID_RELEASE_STORE_PASSWORD:?ANDROID_RELEASE_STORE_PASSWORD is required for signed release builds}"
          : "${ANDROID_RELEASE_KEY_ALIAS:?ANDROID_RELEASE_KEY_ALIAS is required for signed release builds}"
          : "${ANDROID_RELEASE_KEY_PASSWORD:?ANDROID_RELEASE_KEY_PASSWORD is required for signed release builds}"

          KEYSTORE_PATH="${RUNNER_TEMP}/android-release.keystore"
          echo "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"

          echo "ORG_GRADLE_PROJECT_androidReleaseStoreFile=${KEYSTORE_PATH}" >> "${GITHUB_ENV}"
          echo "ORG_GRADLE_PROJECT_androidReleaseStorePassword=${ANDROID_RELEASE_STORE_PASSWORD}" >> "${GITHUB_ENV}"
          echo "ORG_GRADLE_PROJECT_androidReleaseKeyAlias=${ANDROID_RELEASE_KEY_ALIAS}" >> "${GITHUB_ENV}"
          echo "ORG_GRADLE_PROJECT_androidReleaseKeyPassword=${ANDROID_RELEASE_KEY_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Run Android lint
        run: ./gradlew :composeApp:lintDebug --stacktrace

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: Build and stage APK artifact
        env:
          CI_SMTP_HOST: ${{ secrets.CI_SMTP_HOST }}
          CI_SMTP_PORT: ${{ secrets.CI_SMTP_PORT }}
          CI_SMTP_USERNAME: ${{ secrets.CI_SMTP_USERNAME }}
          CI_SMTP_PASSWORD: ${{ secrets.CI_SMTP_PASSWORD }}
          CI_SMTP_FROM_EMAIL: ${{ secrets.CI_SMTP_FROM_EMAIL }}
          CI_SMTP_FROM_NAME: ${{ secrets.CI_SMTP_FROM_NAME }}
          CI_FEEDBACK_TO_EMAIL: ${{ secrets.CI_FEEDBACK_TO_EMAIL }}
          CI_FEEDBACK_SUBJECT: ${{ secrets.CI_FEEDBACK_SUBJECT }}
          CI_POSTHOG_API_KEY: ${{ secrets.CI_POSTHOG_API_KEY }}
          CI_POSTHOG_HOST: ${{ secrets.CI_POSTHOG_HOST }}
        run: bash scripts/prepare_mobile_showcase.sh

      - name: Generate Android update manifest
        if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
        run: bash scripts/generate_android_update_manifest.sh

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          if-no-files-found: warn
          retention-days: 14
          path: |
            composeApp/build/reports/lint-results-debug.html
            composeApp/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-report
          if-no-files-found: warn
          retention-days: 14
          path: |
            composeApp/build/reports/tests/testDebugUnitTest/
            composeApp/build/test-results/testDebugUnitTest/

      - name: Upload delivery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-delivery-artifacts
          if-no-files-found: warn
          retention-days: 14
          path: release-artifacts/

  ios_kotlin_validation:
    name: iOS Kotlin Validation
    runs-on: macos-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || github.ref_name == 'develop' || startsWith(github.ref, 'refs/tags/')))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Prepare CI stubs
        env:
          CI_SMTP_HOST: ${{ secrets.CI_SMTP_HOST }}
          CI_SMTP_PORT: ${{ secrets.CI_SMTP_PORT }}
          CI_SMTP_USERNAME: ${{ secrets.CI_SMTP_USERNAME }}
          CI_SMTP_PASSWORD: ${{ secrets.CI_SMTP_PASSWORD }}
          CI_SMTP_FROM_EMAIL: ${{ secrets.CI_SMTP_FROM_EMAIL }}
          CI_SMTP_FROM_NAME: ${{ secrets.CI_SMTP_FROM_NAME }}
          CI_FEEDBACK_TO_EMAIL: ${{ secrets.CI_FEEDBACK_TO_EMAIL }}
          CI_FEEDBACK_SUBJECT: ${{ secrets.CI_FEEDBACK_SUBJECT }}
          CI_POSTHOG_API_KEY: ${{ secrets.CI_POSTHOG_API_KEY }}
          CI_POSTHOG_HOST: ${{ secrets.CI_POSTHOG_HOST }}
        run: bash scripts/prepare_ci_stubs.sh

      - name: Compile iOS Kotlin target
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --stacktrace

  publish_app_showcase:
    name: Publish App Showcase Image
    runs-on: ubuntu-latest
    needs:
      - android_ci
    if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-delivery-artifacts
          path: release-artifacts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/itclinicapp-showcase"

          TAGS="${IMAGE}:${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            TAGS="${TAGS}"$'\n'"${IMAGE}:${SAFE_REF}"

            if [[ "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
              TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${GITHUB_REF_NAME}"
          fi

          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app-showcase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  publish_android_update_release:
    name: Publish Android Update Release
    runs-on: ubuntu-latest
    needs:
      - android_ci
      - ios_kotlin_validation
    if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download delivery artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-delivery-artifacts
          path: release-artifacts

      - name: Resolve Android release metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
            UPDATE_CHANNEL="stable"
          else
            VERSION_NAME="main.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_TAG="android-main-${GITHUB_RUN_NUMBER}"
            UPDATE_CHANNEL="beta"
          fi

          echo "ANDROID_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "UPDATE_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "UPDATE_RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "UPDATE_CHANNEL=${UPDATE_CHANNEL}" >> "${GITHUB_ENV}"

      - name: Create or update GitHub release for main branch
        if: github.ref_name == github.event.repository.default_branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$UPDATE_RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1 || \
            gh release create "$UPDATE_RELEASE_TAG" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "Android main build $ANDROID_VERSION_NAME" \
              --notes "Automated Android main-branch delivery build for in-app update checks." \
              --prerelease

      - name: Create or update GitHub release for tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$UPDATE_RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1 || \
            gh release create "$UPDATE_RELEASE_TAG" --repo "$GH_REPO" --generate-notes

      - name: Upload Android delivery assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$UPDATE_RELEASE_TAG" \
            --repo "$GH_REPO" \
            release-artifacts/itclinicapp-release.apk \
            release-artifacts/android-update.json \
            --clobber

      - name: Publish channel manifest branch
        env:
          UPDATE_BRANCH: android-updates
        shell: bash
        run: |
          set -euo pipefail

          REPO_ROOT="$PWD"
          UPDATE_WORKTREE="${RUNNER_TEMP}/android-updates-branch"
          MANIFEST_SOURCE="${REPO_ROOT}/release-artifacts/update-manifests/${UPDATE_CHANNEL}.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin "${UPDATE_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${UPDATE_BRANCH}:${UPDATE_BRANCH}"
            git worktree add "${UPDATE_WORKTREE}" "${UPDATE_BRANCH}"
          else
            git worktree add --detach "${UPDATE_WORKTREE}"
            cd "${UPDATE_WORKTREE}"
            git checkout --orphan "${UPDATE_BRANCH}"
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          cp "${MANIFEST_SOURCE}" "${UPDATE_WORKTREE}/${UPDATE_CHANNEL}.json"

          cd "${UPDATE_WORKTREE}"
          git add "${UPDATE_CHANNEL}.json"

          if git diff --cached --quiet; then
            echo "No manifest changes to publish."
            exit 0
          fi

          git commit -m "Update ${UPDATE_CHANNEL} manifest for ${UPDATE_RELEASE_TAG}"
          git push origin HEAD:"${UPDATE_BRANCH}"
