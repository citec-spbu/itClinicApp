name: Mobile App CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

concurrency:
  group: mobile-app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint_android:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Android lint
        run: ./gradlew :composeApp:lintDebug --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: |
            composeApp/build/reports/lint-results-debug.html
            composeApp/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt

  unit_tests_android:
    name: Android Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-report
          path: |
            composeApp/build/reports/tests/testDebugUnitTest/
            composeApp/build/test-results/testDebugUnitTest/

  publish_app_showcase:
    name: Publish App Showcase Image
    runs-on: ubuntu-latest
    needs:
      - lint_android
      - unit_tests_android
    if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/itclinicapp-showcase"

          TAGS="${IMAGE}:${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            TAGS="${TAGS}"$'\n'"${IMAGE}:${SAFE_REF}"

            if [[ "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
              TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${GITHUB_REF_NAME}"
          fi

          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app-showcase/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
