name: Mobile App CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: mobile-app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  android_ci:
    name: Android CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch || github.ref_name == 'develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Prepare CI stubs
        run: bash scripts/prepare_ci_stubs.sh

      - name: Run Android lint
        run: ./gradlew :composeApp:lintDebug --stacktrace

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: Build and stage APK artifact
        run: bash scripts/prepare_mobile_showcase.sh

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          if-no-files-found: warn
          retention-days: 14
          path: |
            composeApp/build/reports/lint-results-debug.html
            composeApp/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-report
          if-no-files-found: warn
          retention-days: 14
          path: |
            composeApp/build/reports/tests/testDebugUnitTest/
            composeApp/build/test-results/testDebugUnitTest/

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          if-no-files-found: warn
          retention-days: 14
          path: release-artifacts/itclinicapp-debug.apk

  ios_kotlin_validation:
    name: iOS Kotlin Validation
    runs-on: macos-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || github.ref_name == 'develop' || startsWith(github.ref, 'refs/tags/')))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Prepare CI stubs
        run: bash scripts/prepare_ci_stubs.sh

      - name: Compile iOS Kotlin target
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --stacktrace

  publish_app_showcase:
    name: Publish App Showcase Image
    runs-on: ubuntu-latest
    needs:
      - android_ci
    if: github.event_name == 'push' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/'))
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: release-artifacts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/itclinicapp-showcase"

          TAGS="${IMAGE}:${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            TAGS="${TAGS}"$'\n'"${IMAGE}:${SAFE_REF}"

            if [[ "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
              TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${GITHUB_REF_NAME}"
          fi

          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push showcase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app-showcase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  release_android_artifact:
    name: Release Android Artifact
    runs-on: ubuntu-latest
    needs:
      - android_ci
      - ios_kotlin_validation
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: release-artifacts

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --generate-notes

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            release-artifacts/itclinicapp-debug.apk \
            --clobber
